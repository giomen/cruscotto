<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruscotto digitale</title>
    <link rel="preload" href="assets/fonts/Montserrat-Regular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="assets/fonts/RobotoCondensed-Regular.ttf" as="font" type="font/ttf" crossorigin>
    
    <!-- CSS ottimizzato -->
    <link rel="stylesheet" href="./style.css">
    
    <!-- Odometer CSS minimo (solo se usato) -->
    <link rel="stylesheet" href="./odometer.css" />
    <script src="./odometer.min.js"></script>
    <script type="module" src="./main.js"></script>

</head>

<body>

    <div class="controls">
        <div class="slider">
            <label for="needleAngle">Posizione lancetta</label>
            <div class="controls-row">
                <input id="needleAngle" type="range" min="-110" max="110" step="1" value="0">
                <span class="angle-value"><span id="needleAngleValue">0</span>°</span>
            </div>
            <label for="fuelLevel">Livello carburante</label>
            <div class="controls-row">
                <input id="fuelLevel" type="range" min="0" max="100" step="1" value="60">
                <span class="angle-value"><span id="fuelLevelValue">60</span>%</span>
            </div>
        </div>
        <div class="spie-toggles" style="display: flex; flex-direction: column;">
            <p style="margin: 0 0 4px 0;">Spie</p>
            <label><input type="checkbox" data-spia="luci"> Anabbaglianti</label>
            <label><input type="checkbox" data-spia="fendi"> Fendinebbia</label>
            <label><input type="checkbox" data-spia="profo"> Profondità</label>
            <label><input type="checkbox" data-spia="generat"> Batteria</label>
            <label><input type="checkbox" data-spia="olio"> Olio</label>
        </div>
        <label class="toggle-row">
            <input type="checkbox" id="toggleMap">
            <span>Mappa</span>
        </label>
        <label class="toggle-row">
            <input type="checkbox" id="toggleSemi">
            <span>Semi</span>
        </label>
        <div class="controls-row" style="margin-top:6px">
            <label for="posSlider" style="font-size:12px">Posizione</label>
            <input id="posSlider" type="range" min="0" max="100" step="1" value="0" style="flex:1">
        </div>
    </div>
    <div class="wrapper">
    <div class="dashboard-display">
        <div class="tacche-principali" id="tacche-principali"></div>
        <div class="tacche-raggiera" id="tacche-raggiera"></div>
        <div class="numbers-ring" id="numbers-ring"></div>
        <div class="border-dial">
            <svg viewBox="0 0 100 100" width="200" height="200">
                <circle cx="50" cy="50" r="45" fill="none" />
            </svg>
        </div>
        <div class="center-dial">
            <div class="speed-wrapper">
                <div class="speed-value" id="speedValue">0</div>
