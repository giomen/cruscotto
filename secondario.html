<script>
    document.addEventListener('DOMContentLoaded', () => {
        /**
     * Imposta il livello carburante
     * @param {number} value - valore da 0 (vuoto) a 100 (pieno)
     */
        function setFuelLevel(value) {
            const clamped = Math.max(0, Math.min(100, value));

            // 1. Muovi l'indicatore freccia
            //    100 (full) → top: 10%   |   0 (empty) → top: 90%
            const topPercent = 98 - (clamped / 100) * 98;
            document.querySelector('.Indicatore').style.top = topPercent + '%';

            // 2. Attiva/disattiva le barre Livello
            //    I livelli sono ordinati dall'alto (pieno) al basso (vuoto)
            const livelli = document.querySelectorAll('.Livello');
            const totale = livelli.length;

            //    Quante barre devono essere accese?
            //    Al 100% → tutte accese   |   0% → nessuna accesa
            const accese = Math.round((clamped / 100) * totale);

            livelli.forEach((el, i) => {
                // i=0 è la prima barra (in alto = piena)
                // una barra si accende se il suo indice è >= (totale - accese)
                if (i >= totale - accese) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
            const spiaRiserva = document.querySelector('.Spia-riserva');
            const indicatore = document.querySelector('.Indicatore');
            if (clamped <= 15) {
                spiaRiserva.classList.add('active');
                indicatore.style.background = 'var(--mood-bad)';
            } else if (clamped < 50 && clamped > 15) {
                spiaRiserva.classList.remove('active');
                indicatore.style.background = 'var(--mood-warning)';
            } else {
                spiaRiserva.classList.remove('active');
                indicatore.style.background = 'var(--bg-color)';
            }
        }


        document.getElementById('fuel-slider').addEventListener('input', (e) => {
            setFuelLevel(Number(e.target.value));
        });

        // imposta subito al valore iniziale
        setFuelLevel(75);
        /**
     * Imposta il livello Tensione Batteria
     * @param {number} value - valore da 0 (vuoto) a 100 (pieno)
     */
        function setBatteryLevel(value) {
            const clamped = Math.max(0, Math.min(100, value));

            // 1. Muovi l'indicatore freccia
            //    100 (full) → top: 10%   |   0 (empty) → top: 90%
            const topPercent = 90 - (clamped / 100) * 80;
            document.querySelector('.Indicatore-tensione').style.top = topPercent + '%';

            // 2. Attiva/disattiva le barre Tensione
            //    I livelli sono ordinati dall'alto (pieno) al basso (vuoto)
            const tensioni = document.querySelectorAll('.Tensione');
            const totale = tensioni.length;

            //    Quante barre devono essere accese?
            //    Al 100% → tutte accese   |   0% → nessuna accesa
            const accese = Math.round((clamped / 100) * totale);

            tensioni.forEach((el, i) => {
                // i=0 è la prima barra (in alto = piena)
                // una barra si accende se il suo indice è >= (totale - accese)
                if (i >= totale - accese) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });

            const indicatore = document.querySelector('.Indicatore-tensione');
            if (clamped <= 45) {
                indicatore.style.background = 'var(--mood-bad)';
            } else if (clamped < 60 && clamped > 45) {
                indicatore.style.background = 'var(--mood-good)';
            } else {
                indicatore.style.background = 'var(--mood-best)';
            }
        }


        document.getElementById('battery-slider').addEventListener('input', (e) => {
            setBatteryLevel(Number(e.target.value));
        });

        // imposta subito al valore iniziale
        setBatteryLevel(75);

        // Toggle spie
        document.querySelectorAll('[data-spia]').forEach(checkbox => {
            checkbox.addEventListener('change', (e) => {
                const nome = e.target.dataset.spia;
                const el = document.querySelector(`.Spia-${nome}`);
                if (!el) return;
                if (e.target.checked) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
        });
    })
</script>
