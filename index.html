    <script>
        window.addEventListener('load', function () {
            var od = new Odometer({
                el: document.getElementById('odometer'),
                value: '32791',
                format: 'd',
                theme: 'minimal'
            });

            od.update(32791);
        });

        document.addEventListener('DOMContentLoaded', () => {
            const needle = document.querySelector('.needle');
            const canvas = document.querySelector('.needle-trail-canvas');
            const ctx = canvas.getContext('2d');
            const angleInput = document.getElementById('needleAngle');
            const angleValue = document.getElementById('needleAngleValue');

            const history = [];
            const maxTrail = 18;

            let lastAngle = null;
            let fadeRaf = null;
            let fadeTimeout = null;
            let fadeStartTime = null;
            const trailFadeDuration = 400; // prova 150, 300, 600...
            const trailFadeDelay = 10;

            function drawNeedleShape(ctx, angleDeg, alpha = 1, blur = 0) {
                const cx = 200;
                const pivotY = 200;

                ctx.save();
                ctx.translate(cx, pivotY);
                ctx.rotate(angleDeg * Math.PI / 180);
                ctx.globalAlpha = alpha;
                ctx.filter = `blur(${blur}px)`;

                const grad = ctx.createLinearGradient(-3, 0, 3, 0);
                grad.addColorStop(0, 'rgba(219,31,31,0.95)');
                grad.addColorStop(0.49, 'rgba(219,31,31,0.95)');
                grad.addColorStop(0.50, 'rgba(181,0,0,0.95)');
                grad.addColorStop(1, 'rgba(241,61,61,0.95)');
                ctx.fillStyle = grad;

                ctx.beginPath();
                ctx.moveTo(-3, 38);
                ctx.lineTo(3, 38);
                ctx.lineTo(2.1, -152);
                ctx.lineTo(-2.1, -152);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            function renderTrail(globalFade = 1) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                history.forEach((angle, i) => {
                    const t = (i + 1) / history.length;
                    drawNeedleShape(ctx, angle, (t * 0.22) * globalFade, (1 - t) * 3.2);
                });
            }

            function fadeTrailOut(timestamp) {
                if (fadeStartTime === null) {
                    fadeStartTime = timestamp;
                }

                const progress = Math.min((timestamp - fadeStartTime) / trailFadeDuration, 1);
                renderTrail(1 - progress);

                if (progress < 1) {
                    fadeRaf = requestAnimationFrame(fadeTrailOut);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    history.length = 0;
                    fadeRaf = null;
                    fadeStartTime = null;
                }
            }


            function stopFadeOut() {
                if (fadeTimeout) {
                    clearTimeout(fadeTimeout);
                    fadeTimeout = null;
                }

                if (fadeRaf) {
                    cancelAnimationFrame(fadeRaf);
                    fadeRaf = null;
                }

                fadeStartTime = null;
            }

            function scheduleFadeOut() {
                if (fadeTimeout) clearTimeout(fadeTimeout);

                fadeTimeout = setTimeout(() => {
                    fadeTimeout = null;
                    if (!fadeRaf) {
                        fadeStartTime = null;
                        fadeRaf = requestAnimationFrame(fadeTrailOut);
                    }
                }, trailFadeDelay);
            }

            function setNeedleAngle(angle) {
                needle.style.transform = `rotate(${angle}deg)`;
                angleValue.textContent = angle;
                angleInput.value = angle;

                const isMoving = lastAngle === null || angle !== lastAngle;
                lastAngle = angle;

                stopFadeOut();

                if (isMoving) {
                    history.push(angle);
                    if (history.length > maxTrail) history.shift();
                    renderTrail();
                }

                scheduleFadeOut();
            }

            angleInput.addEventListener('input', (event) => {
                setNeedleAngle(event.target.valueAsNumber);
            });

            window.setDashboardNeedle = function (angle) {
                setNeedleAngle(angle);
            };

            setNeedleAngle(angleInput.valueAsNumber);
        });
    </script>
